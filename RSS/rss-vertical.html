    // ⚙️ CONFIGURAÇÕES DO CARROSSEL
    const SLIDE_DURATION = 15000; // Tempo em milisegundos (15000 = 15 segundos)
    
    // ============================================
    // NÃO PRECISA EDITAR DAQUI PRA BAIXO
    // ============================================
    
    let currentSlideIndex = 0;
    let carouselInterval = null;
    
    function renderCarousel() {
      const container = document.getElementById('carousel-slide');
      const emptyState = document.getElementById('empty-state');
      const indicatorsContainer = document.getElementById('slide-indicators');
      
      if (slides.length === 0) {
        container.classList.add('hidden');
        emptyState.classList.remove('hidden');
        indicatorsContainer.innerHTML = '';
        return;
      }
      
      container.classList.remove('hidden');
      emptyState.classList.add('hidden');
      
      const slide = slides[currentSlideIndex];
      
      container.innerHTML = `
        <div class="w-full max-w-sm sm:max-w-2xl md:max-w-3xl lg:max-w-3xl mx-auto slide-enter">
          <div class="bg-gradient-to-br from-red-500 to-yellow-500 backdrop-blur-2xl rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8 lg:p-10 border-2 border-red-50/40 glow">
            <img src="${slide.image_url}" 
              alt="${slide.title}"
              class="w-full h-48 sm:h-64 md:h-80 lg:h-[500px] object-cover rounded-xl sm:rounded-2xl mb-4 sm:mb-6 md:mb-8 border-2 border-red-600/60 shadow-2xl"
              onerror="this.src=''; this.alt='Imagem não disponível'; this.classList.add('hidden');">
            <h2 class="text-2xl sm:text-3xl md:text-4xl lg:text-3xl font-extrabold text-white mb-3 sm:mb-4 md:mb-6 leading-tight">${slide.title}</h2>
            <p class="text-base sm:text-lg md:text-xl lg:text-3xl text-purple-100 leading-relaxed">${slide.description}</p>
            <p class="text-3xl text-yellow-100 font-bold leading-relaxed">${slide.datanoticia}</p>
          </div>
        </div>
      `;
      
      indicatorsContainer.innerHTML = slides.map((_, index) => `
        <div class="h-2 sm:h-3 rounded-full transition-all duration-300 ${
          index === currentSlideIndex 
            ? 'bg-purple-400 w-8 sm:w-12 shadow-lg shadow-purple-500/50' 
            : 'bg-purple-500/30 w-2 sm:w-3 hover:bg-purple-500/50'
        }"></div>
      `).join('');
    }
    
    function startCarousel() {
      stopCarousel();
      if (slides.length <= 1) return;
      
      carouselInterval = setInterval(() => {
        currentSlideIndex = (currentSlideIndex + 1) % slides.length;
        renderCarousel();
      }, SLIDE_DURATION);
    }
    
    function stopCarousel() {
      if (carouselInterval) {
        clearInterval(carouselInterval);
        carouselInterval = null;
      }
    }
    
    // Initialize
    function init() {
      renderCarousel();
      startCarousel();
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
