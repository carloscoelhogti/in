<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.5">
  <title>RSS Feed OBS - Visualizador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
    
    * {
      font-family: 'Poppins', sans-serif;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    .slide-enter {
      animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateX(120px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    /*
    .glow {
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.4),
                  0 0 80px rgba(236, 72, 153, 0.2);
    }*/
    
    /* Responsividade para diferentes tamanhos de tela */
    @media (max-width: 768px) {
      .slide-enter {
        animation: slideInMobile 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      @keyframes slideInMobile {
        0% {
          opacity: 0;
          transform: translateY(60px) scale(0.95);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    }
  </style>
  
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full ">
  <div id="viewer-container" class="h-full w-full relative overflow-hidden"><!-- Background decorative elements -->
   <div class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none">
    <div class="absolute top-20 left-20 w-96 h-96 bg-purple-500 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-pink-500 rounded-full blur-3xl"></div>
   </div><!-- Carousel Container -->
   <div class="absolute inset-0 flex items-center justify-center p-4 sm:p-6 md:p-8 lg:p-12">
    <div id="carousel-slide" class="w-full h-full flex items-center justify-center"><!-- Slide content will be inserted here -->
    </div>
   </div><!-- Slide Indicators -->
   <div class="absolute bottom-4 sm:bottom-8 md:bottom-12 left-1/2 transform -translate-x-1/2 flex space-x-2 sm:space-x-3 z-10" id="slide-indicators"><!-- Indicators will be inserted here -->
   </div><!-- Empty State -->
   <div id="empty-state" class="hidden absolute inset-0 flex items-center justify-center p-4">
    <div class="text-center">
     <div class="text-6xl sm:text-7xl md:text-9xl mb-4 sm:mb-6">
      📺
     </div>
     <p class="text-white text-2xl sm:text-3xl md:text-4xl font-bold mb-2 sm:mb-4 px-4">Nenhum slide configurado</p>
     <p class="text-purple-300 text-base sm:text-lg md:text-xl px-4">Edite o array 'slides' no código HTML</p>
    </div>
   </div>
  </div>
  <script>
    // 🎨 CONFIGURAÇÃO DOS SLIDES
    // Edite aqui seus slides! Adicione quantos quiser!
    const slides = [

      {
        title: `Disclosure lança novo single`,
        description: `A banda Disclosure lançou um novo single, 'The Sun Comes Up Tremendous'. A faixa, o primeiro lançamento de Howard e Guy Lawrence em 2026, tem o primeiro nos vocais principais. Com uma construção gradual, a música começa com melodias e texturas envolventes e cinematográficas antes de uma batida grave levar tudo direto para a pista de dança. O lançamento também inclui um novo videoclipe dirigido por Colt Grice e Moldyroom, que mostra os irmãos interpretando a música em um cenário deslumbrante de montanha.`,
        image_url: "https://djmag.com/sites/default/files/styles/djm_23_1005x565/public/2026-04/disclosure-credit-arshum-rouhanian.jpg.webp?itok=dtJfyLcf",
        datanoticia: "1 de Abril de 2026"
      },
     
      {
        title: `Joseph Capriati anuncia line-up`,
        description: `A residência Metamorfosi de Joseph Capriati retorna à Amnesia Ibiza  neste verão. A residência, que acontece todas as terças-feiras, de 30 de junho a 29 de setembro, e leva o nome da gravadora de Capriati e de seu álbum de 2020, verá o DJ italiano convidar uma mistura de nomes novos e consagrados do house e do techno para embalar tanto o Terraço quanto a Club Room. Até agora, a formação confirmada inclui Richie Hawtin , Jamie Jones , Chris Stussy , Seth Troxler , Mau P , Josh Baker , Max Dean , Ben Klock, Maceo Plex, WhoMadeWho, Damian Lazarus , BLOND:ISH, Freddy K, Cloonee , Dubfire, Anfisa Letyago , Traumer, Fatima Hajji e Wade.`,
        image_url: "https://djmag.com/sites/default/files/styles/djm_23_1005x565/public/2026-04/metamorfosi-credit-alberto-alcocer.jpg.webp?itok=ZG8MIGnV",
        datanoticia: "1 de Abril de 2026"
      },

      {
        title: `ames K anuncia álbum de remixes`,
        description: `James K anunciou o lançamento de um novo EP de remixes para acompanhar seu álbum de 2025, 'Friend'. Reinterpretando faixas do álbum lançado pela AD 93 – um dos favoritos da DJ Mag em 2025 – o novo lançamento conta com contribuições de K Wata , Special Guest DJ, Hesaitix, Yushh, JASSS , Drew McDowall, Roza Terenzi, Loidis, Objekt , Priori , Stone e Arushi Jain. Dois dos remixes, 'Play' (Objekt Remix) e 'N'Balmed' (JASSS Purple Remix), foram revelados antes do lançamento completo em 24 de abril.`,
        image_url: "https://djmag.com/sites/default/files/styles/djm_23_1005x565/public/2026-04/james-k-credit-juan-camilo-di%CC%81ez.jpg.webp?itok=XDLaLpjn",
        datanoticia: "1 de Abril de 2026"
      },

      {
        title: `Aeroporto de Manchester`,
        description: `O Terminal 2 do Aeroporto de Manchester renovou um de seus bares com um tema inspirado na famosa boate Haçienda da cidade. Com inauguração prevista para o final deste ano, o The Amber Alehouse agora apresenta diversas referências de design ao lendário local, como padrões no piso inspirados no infame design amarelo e preto do clube, agora fechado. Há também fotos de bandas famosas de Manchester nas paredes, como Oasis e The Stone Roses, além de cópias em vinil emolduradas de discos clássicos ligados à cena musical de Manchester.`,
        image_url: "https://djmag.com/sites/default/files/styles/djm_23_1005x565/public/2026-03/Hac%CC%A7ienda-Bar-MCR-Airport.jpg.webp?itok=XXpdCj2P",
        datanoticia: "2 de Abril de 2026"
      },

      {
        title: `I. JORDAN estreia na Armada Music`,
        description: `I. JORDAN lançou uma nova faixa. 'Proper Silly' é a estreia do DJ e produtor na Armada Music. Você pode conferir abaixo. De acordo com o artista radicado em Londres, a gravadora "me influenciou muito durante a minha adolescência", acrescentando que "detém cerca de 80% do catálogo antigo". A música é inspirada em "grandes sucessos do norte da Inglaterra que não se levam muito a sério" e inclui um verso clássico de rave com um toque retrô.`,
        image_url: "https://djmag.com/sites/default/files/styles/djm_23_1005x565/public/2026-04/1774985325159-Screenshot%202026-03-31%20at%2020.28.36.png.webp?itok=ItJUajdt",
        datanoticia: "2 de Abril de 2026"
      },



    ];
    
    // ⚙️ CONFIGURAÇÕES DO CARROSSEL
    const SLIDE_DURATION = 15000; // Tempo em milisegundos (15000 = 15 segundos)
    
    // ============================================
    // NÃO PRECISA EDITAR DAQUI PRA BAIXO
    // ============================================
    
    let currentSlideIndex = 0;
    let carouselInterval = null;
    
    function renderCarousel() {
      const container = document.getElementById('carousel-slide');
      const emptyState = document.getElementById('empty-state');
      const indicatorsContainer = document.getElementById('slide-indicators');
      
      if (slides.length === 0) {
        container.classList.add('hidden');
        emptyState.classList.remove('hidden');
        indicatorsContainer.innerHTML = '';
        return;
      }
      
      container.classList.remove('hidden');
      emptyState.classList.add('hidden');
      
      const slide = slides[currentSlideIndex];
      
      container.innerHTML = `
        <div class="w-full max-w-sm sm:max-w-2xl md:max-w-3xl lg:max-w-3xl mx-auto slide-enter">
          <div class="bg-gradient-to-br from-red-500 to-yellow-500 backdrop-blur-2xl rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8 lg:p-10 border-2 border-red-50/40 glow">
            <img src="${slide.image_url}" 
              alt="${slide.title}"
              class="w-full h-48 sm:h-64 md:h-80 lg:h-[500px] object-cover rounded-xl sm:rounded-2xl mb-4 sm:mb-6 md:mb-8 border-2 border-red-600/60 shadow-2xl"
              onerror="this.src=''; this.alt='Imagem não disponível'; this.classList.add('hidden');">
            <h2 class="text-2xl sm:text-3xl md:text-4xl lg:text-3xl font-extrabold text-white mb-3 sm:mb-4 md:mb-6 leading-tight">${slide.title}</h2>
            <p class="text-base sm:text-lg md:text-xl lg:text-3xl text-purple-100 leading-relaxed">${slide.description}</p>
            <p class="text-3xl text-yellow-100 font-bold leading-relaxed">${slide.datanoticia}</p>
          </div>
        </div>
      `;
      
      indicatorsContainer.innerHTML = slides.map((_, index) => `
        <div class="h-2 sm:h-3 rounded-full transition-all duration-300 ${
          index === currentSlideIndex 
            ? 'bg-purple-400 w-8 sm:w-12 shadow-lg shadow-purple-500/50' 
            : 'bg-purple-500/30 w-2 sm:w-3 hover:bg-purple-500/50'
        }"></div>
      `).join('');
    }
    
    function startCarousel() {
      stopCarousel();
      if (slides.length <= 1) return;
      
      carouselInterval = setInterval(() => {
        currentSlideIndex = (currentSlideIndex + 1) % slides.length;
        renderCarousel();
      }, SLIDE_DURATION);
    }
    
    function stopCarousel() {
      if (carouselInterval) {
        clearInterval(carouselInterval);
        carouselInterval = null;
      }
    }
    
    // Initialize
    function init() {
      renderCarousel();
      startCarousel();
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
